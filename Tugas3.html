<!DOCTYPE html>
<html>
<head>
    <title>Form Gmail</title>
</head>
<body>
    <form name="data" action="#" method="post">
        <table border="1" cellpadding="3" cellspacing="2">
            <tr>
                <td colspan="2" align="center">
                    <span style="color: #4285F4;">G</span><span style="color: #EA4335;">M</span><span style="color: #FBBC04;">A</span><span style="color: #4285F4;">I</span><span style="color: #34A853;">L</span>, Get Your Gmail I.D
                </td>
            </tr>
            <tr>
                <td>*First name</td>
                <td><input type="text" name="firstname" size="20"></td>
            </tr>
            <tr>
                <td>*Last name</td>
                <td><input type="text" name="lastname" size="20"></td>
            </tr>
            <tr>
                <td>*Preferred content:</td>
                <td>
                    <select name="content">
                        <option>Gmail U.S</option>
                        <option selected>Gmail Indonesia</option>
                        <option>Gmail Asia</option>
                    </select>
                    ?
                </td>
            </tr>
            <tr>
                <td>*Gender:</td>
                <td>
                    <select name="gender">
                        <option selected>Male</option>
                        <option>Female</option>
                    </select>
                    ?
                </td>
            </tr>
            <tr>
                <td>*Gmail ID</td>
                <td><input type="text" name="gmailid" size="20"></td>
            </tr>
            <tr>
                <td colspan="2">&nbsp;&nbsp;ID may constan of a-z,0-9, underscore etc</td>
            </tr>
            <tr>
                <td>*Password:</td>
                <td><input type="password" name="password" size="20"></td>
            </tr>
            <tr>
                <td>*Re-type Password:</td>
                <td><input type="password" name="repassword" size="20"></td>
            </tr>
            <tr>
                <td><input type="submit" value="SUBMIT"></td>
                <td><input type="reset" value="RESET"></td>
            </tr>
        </table>
    </form>
</body>
</html>
