<html>
    <head>
        <title>Tabel 1 Sampai 5</title>
        <style>
            table {
                table-layout: fixed;
                width: 50%;
                height: 30%;
            }
        </style>
    </head>
    <body>
        <h3>Tabel 1</h3>
        <table border="1" cellspacing="0">
            <tr>
                <td align="center">Satu</td>
                <td align="center">Dua</td>
                <td align="center">Tiga</td>
            </tr>
            <tr>
                <td align="center">Empat</td>
                <td align="center">Lima</td>
                <td align="center">Enam</td>
            </tr>
            <tr>
                <td align="center">Tujuh</td>
                <td align="center">Delapan</td>
                <td align="center">Sembilan</td>
            </tr>
        </table>
        <br>
        <h3>Tabel 2</h3>
        <table border="1" cellspacing="0">
            <tr>
                <td align="center">Satu</td>
                <td colspan="2" align="center">Dua</td>
            </tr>
            <tr>
                <td align="center">Tiga</td>
                <td align="center">Empat</td>
                <td align="center">Lima</td>
            </tr>
            <tr>
                <td colspan="2" align="center">Enam</td>
                <td align="center">Tujuh</td>
            </tr>
        </table>
        <br>
        <h3>Tabel 3</h3>
        <table border="1" cellspacing="0">
            <tr>
                <td colspan="3" align="center">Satu</td>
            </tr>
            <tr>
                <td colspan="2" align="center">Dua</td>
                <td align="center">Tiga</td>
            </tr>
            <tr>
                <td align="center">Empat</td>
                <td align="center">Lima</td>
                <td align="center">Enam</td>
            </tr>
        </table>
        <br>
        <h3>Tabel 4</h3>
        <table border="1" cellspacing="0">
            <tr>
                <td rowspan="2" align="center">Satu</td>
                <td align="center">Dua</td>
            </tr>
            <tr>
                <td align="center">Tiga</td>
            </tr>
        </table>
        <br>
        <h3>Tabel 5</h3>
        <table border="1" cellspacing="0">
            <tr>
                <td align="center">Satu</td>
                <td rowspan="2" align="center">Dua</td>
            </tr>
            <tr>
                <td align="center">Tiga</td>
            </tr>
        </table>
    </body>
</html>
