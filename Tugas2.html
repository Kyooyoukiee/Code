<html>
<head>
  <title>Data Siswa</title>
</head>
<body bgcolor="#f3efe8">
  <style>
    body {
      font-family: "Times New Roman", serif;
    }
    td {
      padding: 2px;
    }
    span {
      margin-left: 12px;
      font-size: 20px;
    }
    input[type="text"] {
      width: 190px;
      height: 25px;
      font-size: 18px;
    }
    select {
      width: 100px;
      height: 26px;
      font-size: 18px;
      font-family: "Times New Roman", serif;
    }
  </style>

  <form action="#" method="post" name="data_siswa">
    <table border="1" align="center" width="458" cellspacing="2" bgcolor="#f8f6f1">
      <tr>
        <td colspan="2" align="center" style="font-size: 35px;"><b>Data Siswa</b></td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Nama Lengkap</td>
        <td colspan="2">
          <input type="text" name="nama_lengkap" size="20" maxlength="40" style="font-family: 'Times New Roman', serif;">
        </td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Nama Panggilan</td>
        <td colspan="2">
          <input type="text" name="nama_panggilan" size="20" maxlength="20" style="font-family: 'Times New Roman', serif;">
        </td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Agama</td>
        <td colspan="2">
          <select name="agama">
            <option selected>Katolik</option>
            <option>Islam</option>
            <option>Kristen</option>
            <option>Hindu</option>
            <option>Buddha</option>
            <option>Konghucu</option>
          </select>
          <span>?</span>
        </td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Jenis Kelamin</td>
        <td colspan="2">
          <select name="jenis_kelamin">
            <option selected>Laki-laki</option>
            <option>Perempuan</option>
          </select>
          <span>?</span>
        </td>
      </tr>

      <tr>
        <td valign="middle" style="font-size: 26px;">Alamat</td>
        <td colspan="2">
          <textarea style="font-family: 'Times New Roman', serif; resize: none; font-size: 16px;" name="alamat" rows="8" cols="35" placeholder="Jangan lupa isikan alamat anda dikotak ini !!!"></textarea>
        </td>
      </tr>

      <tr>
        <td colspan="3" align="center" height="50">
          <font size="5">&#9415;&#9415;&#9415;</font>
        </td>
      </tr>

      <tr>
        <td colspan="3" align="center" height="50">
          <font size="5">&#9400;&#9400;&#9400;</font>
        </td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Hobby</td>
        <td colspan="2">
          <input type="radio" name="hobby" value="membaca">Membaca
          <input type="radio" name="hobby" value="menulis">Menulis
          <input type="radio" name="hobby" value="menyanyi">Menyanyi
        </td>
      </tr>

      <tr>
        <td style="font-size: 20px;">Makanan favorit</td>
        <td colspan="2">
          <input type="checkbox" name="makanan" value="soto">Soto
          <input type="checkbox" name="makanan" value="bakso">Bakso
          <input type="checkbox" name="makanan" value="nasi_goreng">Nasi Goreng
        </td>
      </tr>

      <tr>
        <td>
          <input type="submit" value="SUBMIT">
        </td>
        <td colspan="2" align="center">
          <input type="reset" value="RESET">
        </td>
      </tr>
    </table>
  </form>
</body>
</html>
