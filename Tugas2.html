<html>
<head>
  <title>Data Siswa</title>
</head>
<body bgcolor="#f3efe8">
  <style>
    td{
      font-family: "Times New Romans";
    }
    font{
      font-family: "Times New Romans";
    }
    input{
      font-family: "Times New Romans";
    }
    select{
      font-family: "Times New Romans";
    }
    textarea{
      font-family: "Times New Romans";
    }
    submit{
      font-family: "Times New Romans";
    }
    reset{
      font-family: "Times New Romans";
    }
  </style>

  <form action="#" method="post" name="data_siswa">
    <table border="1" align="center" width="458" cellpadding="3" cellspacing="0" bgcolor="#f8f6f1">
      <tr>
        <td colspan="2" align="center">
          <font face="Times New Romans" size="6"><b>Data Siswa</b></font>
        </td>
      </tr>

      <tr>
        <td width="112" nowrap>
          <font face="Times New Romans" size="5">Nama Lengkap</font>
        </td>
        <td colspan="2">
          <input type="text" name="nama_lengkap" size="36" maxlength="40">
        </td>
      </tr>

      <tr>
        <td nowrap>
          <font face="Time New Romans" size="5">Nama Panggilan</font>
        </td>
        <td colspan="2">
          <input type="text" name="nama_panggilan" size="36" maxlength="20">
        </td>
      </tr>

      <tr>
        <td nowrap>
          <font face="Time New Romans" size="5">Agama</font>
        </td>
        <td colspan="2">
          <select name="agama">
            <option selected>Katolik</option>
            <option>Islam</option>
            <option>Kristen</option>
            <option>Hindu</option>
            <option>Buddha</option>
            <option>Konghucu</option>
          </select>
          <font face="Time New Romans" size="4"> ?</font>
        </td>
      </tr>

      <tr>
        <td nowrap>
          <font face="Time New Romans" size="5">Jenis Kelamin</font>
        </td>
        <td colspan="2">
          <select name="jenis_kelamin">
            <option selected>Laki-laki</option>
            <option>Perempuan</option>
          </select>
          <font face="Time New Romans" size="4"> ?</font>
        </td>
      </tr>

      <tr>
        <td valign="middle" nowrap>
          <font face="Time New Romans" size="6">Alamat</font>
        </td>
        <td colspan="2">
          <textarea name="alamat" rows="10" cols="40" placeholder="Jangan lupa isikan alamat anda dikotak ini !!!" style="resize: none"></textarea>
        </td>
      </tr>

      <tr>
        <td colspan="3" align="center" height="50">
          <font face="Time New Romans" size="5">&#9415;&#9415;&#9415;</font>
        </td>
      </tr>

      <tr>
        <td colspan="3" align="center" height="50">
          <font face="Time New Romans" size="5">&#9400;&#9400;&#9400;</font>
        </td>
      </tr>

      <tr>
        <td nowrap>
          <font face="Time New Romans" size="6">Hobby</font>
        </td>
        <td colspan="2">
          <input type="radio" name="hobby" value="membaca">Membaca
          <input type="radio" name="hobby" value="menulis">Menulis
          <input type="radio" name="hobby" value="menyanyi">Menyanyi
        </td>
      </tr>

      <tr>
        <td nowrap>
          <font face="Time New Romans" size="5">Makanan favorit</font>
        </td>
        <td colspan="2">
          <input type="checkbox" name="makanan" value="soto">Soto
          <input type="checkbox" name="makanan" value="bakso">Bakso
          <input type="checkbox" name="makanan" value="nasi_goreng">Nasi Goreng
        </td>
      </tr>

      <tr>
        <td>
          <input type="submit" value="SUBMIT">
        </td>
        <td colspan="2" align="center">
          <input type="reset" value="RESET">
        </td>
      </tr>
    </table>
  </form>
</body>
</html>
